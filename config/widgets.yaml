---
# Disk paths must be mounted into the Homepage container to be accessible
- resources:
    cpu: true
    memory: true
    expanded: true
    refresh: 5000
    label: System
    disk:
      - /mnt/cache

- resources:
    expanded: true
    refresh: 5000
    label: Array
    disk:
      - /mnt/user0  # Unraid's combined array view (excludes cache)

- resources:
    expanded: true
    refresh: 5000
    label: Disks
    disk:
      - /mnt/disk1
      - /mnt/disk2
      - /mnt/disk3
      - /mnt/disk4

# - openweathermap:
    # label: Calgary, AB
    # units: metric
    # provider: openweathermap
    # cache: 10

- openmeteo:
    label: Calgary, AB
    timezone: America/Edmonton
    units: metric
    cache: 5  # Open-Meteo has no API key but rate limits; caching prevents 429 errors
    format:
      maximumFractionDigits: 1

- datetime:
    text_size: sm
    format:
      dateStyle: short
      timeStyle: short
      hour12: true
      timeZone: 'America/Edmonton'

